<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meteostanica</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0c0d10;
            --clock-color: #f1c40f;
            --out-color: #3498db;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: #232731;
        }
        body { margin: 0; padding: 20px; background-color: var(--bg-color); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; }
        button { background: var(--out-color); border: none; padding: 10px; color: white; border-radius: 5px; cursor: pointer; }
        input { flex-grow: 1; padding: 10px; background: #1a1d24; border: 1px solid var(--border-color); color: white; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 10px; }
        #time { font-size: 4rem; color: var(--clock-color); }
        @media (orientation: portrait) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="getLocation()">GPS</button>
        <input type="text" id="city" placeholder="Mesto...">
        <input type="text" id="radio" placeholder="Rádio...">
    </div>
    <div class="grid">
        <div class="card"><div id="time">00:00</div><div id="date">--.--.----</div></div>
        <div class="card"><h2>Teplota</h2><b id="temp">--°C</b></div>
    </div>
    <audio id="player"></audio>
    <script>
        function update() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('sk-SK', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('date').textContent = now.toLocaleDateString('sk-SK');
        }
        setInterval(update, 1000);
        update();
        function getLocation() { navigator.geolocation.getCurrentPosition(p => console.log(p)); }
    </script>
</body>
</html>
