<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N7 Mass Effect Tactical Station</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #030407;
            --me-orange: #ff5500;
            --me-blue: #00d2ff;
            --me-grey: #1a1f29;
            --me-text: #e2e8f0;
            --active-day: rgba(255, 85, 0, 0.2);
            --border-color: rgba(0, 210, 255, 0.2);
        }

        html { height: 100%; }

        body {
            margin: 0; padding: 10px;
            background-color: var(--bg-color); color: var(--me-text);
            font-family: 'Share Tech Mono', monospace;
            /* 100vh v mobilnom "web" tabe zarátava aj adresný riadok, preto sa spodok orežal.
               100dvh sa prispôsobí skutočnému viditeľnému priestoru rovnako vo web tabe aj v apke. */
            height: 100vh; height: 100dvh;
            display: flex; flex-direction: column;
            box-sizing: border-box; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0c101b 0%, #030407 100%);
        }

        /* SCREENSAVER / DIMMER */
        #screensaver-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95); z-index: 99999;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
        }
        #ss-clock { font-family: 'Orbitron', sans-serif; font-size: 5rem; color: rgba(255, 85, 0, 0.6); font-weight: 700; text-align: center; }
        #ss-info { font-size: 1rem; color: rgba(0, 210, 255, 0.4); margin-top: 10px; text-transform: uppercase; }

        /* UTILITY BAR: GPS + TICKER (rádio + burza) + DIM */
        .util-bar { display: flex; align-items: stretch; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
        .icon-btn {
            background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: var(--me-blue);
            font-size: 1.1rem; cursor: pointer; border-radius: 6px; padding: 0 14px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:active { background: rgba(0,210,255,0.15); }

        .ticker-bar {
            flex: 1; min-width: 0; overflow: hidden; position: relative;
            background: rgba(26, 31, 41, 0.6); border: 1px solid var(--border-color); border-left: 3px solid var(--me-blue);
            border-radius: 6px; display: flex; align-items: center;
        }
        .ticker-track {
            display: inline-block; white-space: nowrap; padding-left: 100%;
            font-size: 0.8rem; animation: ticker-scroll 32s linear infinite;
        }
        @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .tk-radio { color: var(--me-blue); font-weight: bold; }
        .tk-name { color: #8892b0; }
        .tk-up { color: #39d98a; }
        .tk-down { color: #ff6b6b; }

        /* HERO: HODINY + EKVALIZÉR + MUTE/VOLUME */
        .hero-block {
            grid-area: hero;
            display: flex; flex-direction: column; align-items: center; gap: 14px;
            box-sizing: border-box; width: 100%; min-height: 0;
        }
        .clock-block { text-align: center; cursor: pointer; flex-shrink: 0; }
        .me-time { font-family: 'Orbitron', sans-serif; font-weight: 900; color: #fff; line-height: 1; display: block; }
        .me-seconds { color: var(--me-orange); font-weight: 400; vertical-align: baseline; }
        .me-zone-info { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        .hint-click { font-size: 0.65rem; color: #555; text-transform: uppercase; margin-top: 5px; }

        .eq-row { display: flex; align-items: center; gap: 10px; width: 100%; min-width: 0; }
        #eq-canvas { flex: 1; min-width: 0; width: 100%; height: 80px; display: block; }
        .vol-box {
            display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0;
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px 12px;
        }
        .btn-me {
            background: rgba(0,0,0,0.5); border: 1px solid var(--me-blue);
            color: var(--me-blue); font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: bold; cursor: pointer; text-transform: uppercase;
            padding: 6px 10px; border-radius: 4px; transition: 0.2s; width: 100%;
        }
        .btn-me.is-muted { border-color: var(--me-orange); color: var(--me-orange); }
        .vol-slider-vert { writing-mode: vertical-lr; direction: rtl; width: 6px; height: 60px; accent-color: var(--me-blue); }

        /* SEARCH: MESTO / RÁDIO */
        .search-group { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
        .search-group.mesto { grid-area: mesto; }
        .search-group.radio { grid-area: radio; }
        .search-group label { font-size: 0.7rem; color: var(--me-blue); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
        .search-group.radio label { color: var(--me-orange); }
        .search-container { position: relative; width: 100%; }
        .search-container input {
            width: 100%; padding: 10px 12px; background: #000; border: 1px solid var(--me-blue);
            border-radius: 4px; color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; box-sizing: border-box;
        }
        .search-group.radio .search-container input { border-color: var(--me-orange); }
        .sug-box {
            position: absolute; top: 100%; left: 0; right: 0; background: #090d14;
            border: 1px solid var(--me-blue); border-top: none; list-style: none; margin: 0; padding: 0; max-height: 150px; overflow-y: auto; z-index: 999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border-radius: 0 0 6px 6px;
        }
        .sug-box li { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #141b29; font-size: 0.85rem; }
        .sug-box li:hover { background: var(--me-orange); color: #000; }
        .wakelock-status { font-size: 0.6rem; color: #4ade80; }

        /* MAIN LAYOUT — CSS grid s pomenovanými oblasťami, aby sme vedeli poprehadzovať
           poradie medzi na stojaka a na ležato bez duplikovania HTML. */
        .main-layout {
            flex-grow: 1; min-height: 0; display: grid; gap: 10px;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: auto auto 1fr auto;
            grid-template-areas:
                "hero hero hero hero hero hero"
                "mesto mesto mesto radio radio radio"
                "forecast forecast forecast forecast forecast forecast"
                "temp temp hum hum press press";
        }

        /* WEEK FORECAST */
        .week-forecast { grid-area: forecast; display: grid; gap: 6px; min-height: 0; }
        .day-card {
            background: rgba(10, 14, 23, 0.8); border: 1px solid rgba(0, 212, 255, 0.1);
            box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; border-radius: 4px;
        }
        .day-card.current { border-color: var(--me-orange); background: var(--active-day); }
        .day-name { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.85rem; color: var(--me-blue); text-transform: uppercase; }
        .day-card.current .day-name { color: var(--me-orange); }
        .day-date { font-size: 0.75rem; color: #888; }
        .day-icon { font-size: 1.6rem; }
        .day-temps { font-size: 0.95rem; }
        .day-temps .hi { color: #ff6b6b; font-weight: bold; }
        .day-temps .lo { color: #4dadff; }
        .day-rain { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }
        .day-rain.yes { color: #00d2ff; font-weight: bold; }

        /* METRICS */
        .metric-card {
            background: rgba(10, 14, 23, 0.9); border: 1px solid var(--border-color);
            padding: 12px; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; border-radius: 6px;
        }
        .metric-card.temp { grid-area: temp; border-left: 4px solid var(--me-blue); }
        .metric-card.hum { grid-area: hum; }
        .metric-card.press { grid-area: press; }
        .metric-label { font-size: 0.75rem; color: #556c85; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px;}
        .metric-value { font-family: 'Orbitron', sans-serif; font-weight: 700; color: #fff; line-height: 1.1; }
        .metric-sub { font-size: 0.8rem; color: #8892b0; margin-top: 2px;}
        .metric-sub b { color: var(--me-orange); }
        .unit { font-size: 0.45em; vertical-align: super; font-weight: normal; color: #64748b; }

        /* ALARM OVERLAY */
        .alarm-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(3, 4, 7, 0.98); z-index: 10000;
            display: none; padding: 20px; box-sizing: border-box; flex-direction: column;
        }
        .alarm-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--me-orange); padding-bottom: 10px; margin-bottom: 15px; }
        .alarm-title { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; color: var(--me-orange); }
        .alarm-grid-list { display: grid; gap: 10px; overflow-y: auto; flex: 1; }
        .alarm-item-card { background: #111622; border: 1px solid #222e45; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border-radius: 4px; }
        .alarm-item-card.enabled { border-color: var(--me-blue); }
        .alarm-time-row { display: flex; justify-content: space-between; align-items: center; }
        .alarm-time-picker { background: #000; color: #fff; border: 1px solid var(--me-blue); font-size: 1.3rem; padding: 4px; font-family: monospace; width: 100px;}
        .alarm-item-card input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--me-orange); }
        .alarm-config-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; font-size: 0.85rem; }
        .alarm-sound-select { background: #000; color: #fff; border: 1px solid #445; padding: 5px; flex: 1; font-size: 0.85rem; }

        /* =========================================
           📱 MEDIA QUERIES (LANDSCAPE VS PORTRAIT)
           ========================================= */

        /* 📐 LANDSCAPE (NA LEŽATO)
           hero je bordovaná karta s hodinami+ekvalizérom+mute vedľa seba,
           predpoveď na týždeň sa skrýva (nezmestí sa vedľa toho všetkého),
           dole je jeden riadok: teplota/vlhkosť/tlak + mesto/rádio. */
        @media (orientation: landscape) {
            .icon-btn { font-size: 1rem; padding: 0 10px; }
            .ticker-track { font-size: clamp(0.65rem, 1.6dvh, 0.8rem); }

            .main-layout {
                grid-template-columns: repeat(5, 1fr);
                grid-template-rows: 1fr auto;
                grid-template-areas:
                    "hero hero hero hero hero"
                    "temp hum press mesto radio";
            }
            .week-forecast { display: none; }

            .hero-block {
                flex-direction: row; justify-content: center;
                background: rgba(10, 14, 23, 0.6); border: 1px solid var(--border-color); border-radius: 10px;
                padding: clamp(8px, 2dvh, 16px) clamp(12px, 3dvh, 22px);
            }
            .clock-block { flex: 0 0 auto; }
            .me-time { font-size: clamp(2.4rem, 10dvh, 5.5rem); letter-spacing: -2px; }
            .me-seconds { font-size: 0.35em; }
            .eq-row { flex: 1; }
            #eq-canvas { height: clamp(60px, 14dvh, 100px); }
            .vol-box { padding: clamp(6px, 1.4dvh, 10px) 10px; }
            .vol-slider-vert { height: clamp(40px, 9dvh, 70px); }

            .metric-card { padding: clamp(6px, 1.4dvh, 12px); }
            .metric-label { font-size: clamp(0.6rem, 1.4dvh, 0.75rem); }
            .metric-value { font-size: clamp(1.4rem, 4.5dvh, 2.6rem); }
            .metric-sub { font-size: clamp(0.65rem, 1.5dvh, 0.8rem); }
            .search-group label { font-size: clamp(0.6rem, 1.3dvh, 0.7rem); }
            .search-container input { padding: clamp(6px, 1.4dvh, 10px) 10px; font-size: clamp(0.75rem, 1.7dvh, 0.9rem); }

            .alarm-grid-list { grid-template-columns: repeat(2, 1fr); }
        }

        /* 📱 PORTRAIT (NA STOJATO)
           hodiny samostatne hore, pod nimi ekvalizér+mute na celú šírku,
           potom mesto/rádio, plná 7-dňová predpoveď so zvýrazneným dneškom,
           úplne dole teplota/vlhkosť/tlak. */
        @media (orientation: portrait) {
            body { padding: 12px; gap: 12px; }

            .search-container input { padding: 14px 15px; font-size: 1.05rem; }

            .me-time { font-size: 16vw; letter-spacing: -3px; }
            .me-seconds { font-size: 5.5vw; }

            .week-forecast { grid-template-columns: 1fr; gap: 4px; }
            .day-card { padding: 8px 12px; border-radius: 6px; }
            .day-name { font-size: 0.85rem; min-width: 45px; }
            .day-date { font-size: 0.8rem; min-width: 45px; }
            .day-icon { font-size: 1.3rem; }
            .day-temps { font-size: 0.9rem; min-width: 60px; text-align: right; }
            .day-rain { font-size: 0.8rem; min-width: 80px; text-align: right; }

            .metric-card { padding: 10px 5px; text-align: center; align-items: center; border-radius: 6px; }
            .metric-label { font-size: 0.65rem; white-space: nowrap; }
            .metric-value { font-size: 1.6rem; margin-top: 4px; }
            .metric-sub { display: none; }

            .alarm-grid-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- OVERLAY SCREENSAVER -->
    <div id="screensaver-overlay" onclick="disableScreensaver()">
        <div id="ss-clock">00:00</div>
        <div id="ss-info">Prebudiť N7 stanicu</div>
    </div>

    <!-- UTILITY BAR: GPS / TICKER (rádio naživo + burza) / DIM -->
    <div class="util-bar">
        <button class="icon-btn" onclick="getLocationByGPS()" title="Zamerať polohu">📍</button>
        <div class="ticker-bar">
            <div class="ticker-track" id="ticker-track"></div>
        </div>
        <button class="icon-btn" onclick="enableScreensaver()" title="Stlmiť obrazovku">🌙</button>
    </div>

    <!-- DYNAMIC CORE LAYOUT -->
    <div class="main-layout">

        <!-- HERO: HODINY + EKVALIZÉR + MUTE/VOLUME -->
        <div class="hero-block">
            <div class="clock-block" onclick="openAlarmSettings()">
                <div class="me-time"><span id="time-hm">00:00</span><span class="me-seconds" id="time-s">00</span></div>
                <div class="me-zone-info" id="date-string">PONDELOK, 1. JANUÁR</div>
                <div class="hint-click">➔ Nastavenie budíkov & automatizácie</div>
            </div>
            <div class="eq-row">
                <canvas id="eq-canvas"></canvas>
                <div class="vol-box">
                    <button class="btn-me" id="btn-mute" onclick="toggleMute()">Mute</button>
                    <input type="range" id="vol-control" class="vol-slider-vert" min="0" max="1" step="0.05" value="0.7" oninput="setVolume(this.value)">
                </div>
            </div>
        </div>

        <!-- MESTO -->
        <div class="search-group mesto">
            <label>Mesto <span id="wl-indicator" class="wakelock-status">●</span></label>
            <div class="search-container">
                <input type="text" id="city-search" placeholder="Hľadať mesto..." oninput="searchCity()" onfocus="this.select()">
                <ul id="city-sug" class="sug-box"></ul>
            </div>
        </div>

        <!-- RÁDIO -->
        <div class="search-group radio">
            <label>Rádio</label>
            <div class="search-container">
                <input type="text" id="radio-search" placeholder="Hľadať rádio..." oninput="searchRadio()" onfocus="this.select()">
                <ul id="radio-sug" class="sug-box"></ul>
            </div>
        </div>

        <!-- TÝŽDEŇ (len na stojato) -->
        <div class="week-forecast" id="week-bar"></div>

        <!-- METRIKY -->
        <div class="metric-card temp">
            <div class="metric-label">Teplota</div>
            <div class="metric-value"><span id="curr-temp">--.-</span><span class="unit">°C</span></div>
            <div class="metric-sub">Max: <b id="curr-hi">--°C</b></div>
        </div>
        <div class="metric-card hum">
            <div class="metric-label">Vlhkosť</div>
            <div class="metric-value"><span id="curr-hum">--</span><span class="unit">%</span></div>
            <div class="metric-sub">Vietor: <b id="curr-wind">-- km/h</b></div>
        </div>
        <div class="metric-card press">
            <div class="metric-label">Tlak</div>
            <div class="metric-value"><span id="curr-press">----</span><span class="unit">hPa</span></div>
            <div class="metric-sub">N7 Station</div>
        </div>
    </div>

    <!-- ALARM OVERLAY PANEL -->
    <div class="alarm-overlay" id="alarm-panel">
        <div class="alarm-header">
            <div class="alarm-title">Konfigurácia Budení & Automatizácie</div>
            <button class="btn-me" style="width:auto; padding:8px 15px; font-size:0.8rem;" onclick="closeAlarmSettings()">Uložiť & Zavrieť X</button>
        </div>
        <div class="alarm-grid-list" id="alarm-list-container"></div>
    </div>

    <audio id="stream-player" preload="none" crossorigin="anonymous"></audio>

    <script>
        let currentLoc = JSON.parse(localStorage.getItem('selected_location')) || { name: "Bratislava", lat: 48.1482, lon: 17.1067 };
        let lastRadioUrl = localStorage.getItem('last_radio_url') || "https://stream.funradio.sk/fun128.mp3";
        let lastRadioName = localStorage.getItem('last_radio_name') || "Fun Rádio";
        let isMuted = false;
        let alarmTimeoutActive = false;
        let wakeLock = null;

        const streamPlayer = document.getElementById('stream-player');
        const daysSk = ["Nedeľa", "Pondelok", "Utorok", "Streda", "Štvrtok", "Piatok", "Sobota"];
        const weatherIcons = {
            0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️", 45: "🌫️", 48: "🌫️",
            51: "🌧️", 53: "🌧️", 55: "🌧️", 61: "🌧️", 63: "🌧️", 65: "🌧️",
            71: "❄️", 73: "❄️", 75: "❄️", 80: "🌦️", 81: "🌦️", 82: "⛈️", 95: "⛈️"
        };

        let alarms = JSON.parse(localStorage.getItem('weather_alarms')) || [];
        if (alarms.length === 0) {
            for(let i=1; i<=10; i++) {
                alarms.push({ id: i, time: `0${i}:00`.slice(-5), enabled: false, type: 'radio' });
            }
        }

        document.getElementById('radio-search').value = lastRadioName;
        streamPlayer.volume = parseFloat(document.getElementById('vol-control').value);

        /* ========== TICKER (rádio naživo + burza) ==========
           TODO: nahradiť dummy hodnoty fetchom z Cloudflare Workera.
           - "teraz hrá" potrebuje ICY metadata zo streamu (Worker s Icy-MetaData:1 hlavičkou)
           - burzové indexy potrebujú voľné API bez CORS (Worker ako proxy + cache ~60s) */
        function buildTicker() {
            const stocks = [
                { n: 'S&P 500', v: '5 621', c: '+0.42%', up: true },
                { n: 'NASDAQ', v: '17 890', c: '+0.61%', up: true },
                { n: 'DOW JONES', v: '39 120', c: '-0.12%', up: false },
                { n: 'DAX', v: '18 340', c: '+0.28%', up: true },
                { n: 'NIKKEI 225', v: '38 900', c: '-0.35%', up: false }
            ];
            let seg = `<span class="tk-radio">📻 ${lastRadioName}</span>&nbsp;&nbsp;•&nbsp;&nbsp;`;
            stocks.forEach(s => {
                seg += `<span class="tk-name">${s.n}</span> <span class="${s.up ? 'tk-up' : 'tk-down'}">${s.up ? '▲' : '▼'} ${s.v} ${s.c}</span>&nbsp;&nbsp;•&nbsp;&nbsp;`;
            });
            document.getElementById('ticker-track').innerHTML = seg + seg;
        }
        buildTicker();

        /* ========== WEB AUDIO — reaktívny ekvalizér ==========
           Ak stream nepošle CORS hlavičky (bežné pri mnohých net rádiách),
           analyser dáta ostanú "ploché" a ekvalizér automaticky prejde
           do idle "tep srdca" animácie namiesto reaktívnych stĺpcov. */
        let audioCtx, analyser, freqData, audioGraphReady = false;
        function initAudioGraph() {
            if (audioGraphReady) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaElementSource(streamPlayer);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64;
                freqData = new Uint8Array(analyser.frequencyBinCount);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                audioGraphReady = true;
            } catch(e) { /* CORS obmedzenie streamu — necháme idle režim */ }
        }
        document.addEventListener('click', initAudioGraph, { once: true });
        function resumeAudioCtx() { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }

        const EQ_BARS = 18, EQ_SEG = 8;
        let eqLevels = new Array(EQ_BARS).fill(0.12);
        let eqTargets = new Array(EQ_BARS).fill(0.12);
        let eqDust = [];
        function setupDust(w, h) {
            eqDust = [];
            for (let i = 0; i < 26; i++) eqDust.push({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.4+0.5, s: Math.random()*0.5+0.15, o: Math.random()*10 });
        }
        let eqLastW = 0, eqLastH = 0;
        function drawEqualizer() {
            const canvas = document.getElementById('eq-canvas');
            requestAnimationFrame(drawEqualizer);
            if (!canvas) return;
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            const targetW = Math.max(1, Math.round(rect.width * dpr));
            const targetH = Math.max(1, Math.round(rect.height * dpr));
            if (canvas.width !== targetW || canvas.height !== targetH) {
                canvas.width = targetW; canvas.height = targetH;
                setupDust(targetW, targetH);
            }
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            if (W < 4 || H < 4) return;
            ctx.clearRect(0, 0, W, H);

            const playing = !streamPlayer.paused;
            let reactive = false;
            if (playing && analyser) {
                analyser.getByteFrequencyData(freqData);
                let sum = 0; for (let i = 0; i < freqData.length; i++) sum += freqData[i];
                if (sum / freqData.length > 4) reactive = true;
            }

            if (reactive) {
                const step = Math.max(1, Math.floor(freqData.length / EQ_BARS));
                for (let i = 0; i < EQ_BARS; i++) eqTargets[i] = Math.max(0.05, (freqData[i*step] || 0) / 255);
            } else {
                const t = performance.now() / 1000;
                for (let i = 0; i < EQ_BARS; i++) {
                    const phase = (i / EQ_BARS) * Math.PI * 2;
                    eqTargets[i] = 0.1 + 0.1 * Math.max(0, Math.sin(t * 1.4 + phase * 3));
                }
            }

            const gap = W * 0.012;
            const barW = (W - gap * (EQ_BARS - 1)) / EQ_BARS;
            const segH = (H - 4) / EQ_SEG;
            for (let i = 0; i < EQ_BARS; i++) {
                eqLevels[i] += (eqTargets[i] - eqLevels[i]) * 0.18;
                const activeSegs = Math.round(eqLevels[i] * EQ_SEG);
                const x = i * (barW + gap);
                for (let s = 0; s < EQ_SEG; s++) {
                    const y = H - (s + 1) * segH + 1;
                    if (s < activeSegs) {
                        ctx.fillStyle = (s / EQ_SEG > 0.75) ? 'rgba(180,245,255,0.95)' : 'rgba(0,190,230,0.85)';
                        ctx.shadowColor = 'rgba(0,210,255,0.85)'; ctx.shadowBlur = 6 * dpr;
                    } else {
                        ctx.fillStyle = 'rgba(0,210,255,0.06)'; ctx.shadowBlur = 0;
                    }
                    ctx.fillRect(x, y, barW, Math.max(1, segH - 2));
                }
                ctx.shadowBlur = 0;
            }
            eqDust.forEach(d => {
                d.y -= d.s; if (d.y < 0) { d.y = H; d.x = Math.random() * W; }
                ctx.fillStyle = 'rgba(150,235,255,' + (0.12 + 0.12 * Math.sin(d.o + performance.now()/700)) + ')';
                ctx.fillRect(d.x, d.y, d.r * dpr, d.r * dpr);
            });
        }
        drawEqualizer();

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wl-indicator').style.color = "#4ade80";
                }
            } catch (err) {}
        }
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') await requestWakeLock();
        });
        document.addEventListener('click', () => { if(!wakeLock) requestWakeLock(); }, { once: true });

        document.addEventListener('click', (e) => {
            if(!e.target.closest('#city-search') && !e.target.closest('#city-sug')) document.getElementById('city-sug').innerHTML = '';
            if(!e.target.closest('#radio-search') && !e.target.closest('#radio-sug')) document.getElementById('radio-sug').innerHTML = '';
        });

        let ssTimeout;
        function resetScreensaverTimer() { clearTimeout(ssTimeout); ssTimeout = setTimeout(enableScreensaver, 300000); }
        window.onload = resetScreensaverTimer; document.onmousemove = resetScreensaverTimer; document.ontouchstart = resetScreensaverTimer;

        function enableScreensaver() {
            const now = new Date();
            document.getElementById('ss-clock').textContent = now.toLocaleTimeString('sk-SK', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('screensaver-overlay').style.display = 'flex';
        }
        function disableScreensaver() { document.getElementById('screensaver-overlay').style.display = 'none'; resetScreensaverTimer(); }

        function updateClock() {
            const now = new Date();
            const hmStr = now.toLocaleTimeString('sk-SK', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('time-hm').textContent = hmStr;
            document.getElementById('time-s').textContent = now.toLocaleTimeString('sk-SK', {second: '2-digit'});
            if(document.getElementById('screensaver-overlay').style.display === 'flex') document.getElementById('ss-clock').textContent = hmStr;

            document.getElementById('date-string').textContent = `${daysSk[now.getDay()].toUpperCase()}, ${now.toLocaleDateString('sk-SK', {day: 'numeric', month: 'long'}).toUpperCase()}`;

            if (now.getSeconds() === 0) {
                const currentTimeStr = now.toTimeString().substring(0, 5);
                alarms.forEach(al => {
                    if (al.enabled && al.time === currentTimeStr) { disableScreensaver(); triggerAlarm(al); }
                });
            }
        }
        setInterval(updateClock, 1000); updateClock();

        async function fetchWeather() {
            document.getElementById('city-search').value = currentLoc.name;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${currentLoc.lat}&longitude=${currentLoc.lon}&current=temperature_2m,relative_humidity_2m,weather_code,pressure_msl,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto`;

            try {
                const res = await fetch(url); const data = await res.json();
                document.getElementById('curr-temp').textContent = data.current.temperature_2m.toFixed(1);
                document.getElementById('curr-hum').textContent = data.current.relative_humidity_2m;
                document.getElementById('curr-press').textContent = Math.round(data.current.pressure_msl);
                document.getElementById('curr-wind').textContent = data.current.wind_speed_10m.toFixed(0);
                document.getElementById('curr-hi').textContent = Math.round(data.daily.temperature_2m_max[0]) + "°C";

                const weekBar = document.getElementById('week-bar'); weekBar.innerHTML = '';
                const today = new Date();
                for(let i=0; i<7; i++) {
                    const fDate = new Date(); fDate.setDate(today.getDate() + i);
                    const card = document.createElement('div'); card.className = `day-card ${i===0?'current':''}`;
                    const probRain = data.daily.precipitation_probability_max[i] || 0;
                    card.innerHTML = `
                        <div class="day-name">${i===0?"Dnes":daysSk[fDate.getDay()].substring(0,3)}</div>
                        <div class="day-date">${fDate.toLocaleDateString('sk-SK',{day:'numeric',month:'numeric.'})}</div>
                        <div class="day-icon">${weatherIcons[data.daily.weather_code[i]]||"☁️"}</div>
                        <div class="day-temps"><span class="hi">${Math.round(data.daily.temperature_2m_max[i])}°</span> / <span class="lo">${Math.round(data.daily.temperature_2m_min[i])}°</span></div>
                        <div class="day-rain ${probRain>30?'yes':''}">${probRain>30?`Prší (${probRain}%)`:'Neprší'}</div>
                    `;
                    weekBar.appendChild(card);
                }
            } catch(e) {}
        }

        function playSynthTone(index) {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ac.createOscillator(); const gain = ac.createGain();
            osc.connect(gain); gain.connect(ac.destination);
            const tones = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25];
            osc.frequency.setValueAtTime(tones[index] || 440, ac.currentTime);
            osc.type = index % 2 === 0 ? 'sawtooth' : 'square';
            gain.gain.setValueAtTime(0.3, ac.currentTime); osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 1.5);
            setTimeout(() => { osc.stop(); ac.close(); }, 1600);
        }

        function triggerAlarm(alarm) {
            if(alarm.type === 'radio' && lastRadioUrl) {
                resumeAudioCtx();
                streamPlayer.src = lastRadioUrl; streamPlayer.play().catch(()=>{});
            } else {
                let count = 0; const toneIdx = parseInt(alarm.type) || 0;
                const loop = setInterval(() => {
                    if(!alarmTimeoutActive && count < 5) { playSynthTone(toneIdx); count++; } else { clearInterval(loop); }
                }, 2000);
            }
        }

        function openAlarmSettings() {
            const container = document.getElementById('alarm-list-container'); container.innerHTML = '';
            alarms.forEach((al) => {
                const card = document.createElement('div'); card.className = `alarm-item-card ${al.enabled ? 'enabled' : ''}`;
                let soundOpts = `<option value="radio" ${al.type==='radio'?'selected':''}>📻 Rádio (${lastRadioName})</option>`;
                for(let t=0; t<10; t++) soundOpts += `<option value="${t}" ${al.type==t?'selected':''}>🎵 Synth #${t+1}</option>`;
                card.innerHTML = `
                    <div class="alarm-time-row">
                        <label style="color:var(--me-blue);font-weight:bold;">Budenie #${al.id}</label>
                        <input type="checkbox" ${al.enabled?'checked':''} onchange="toggleAlarmSlot(${al.id}, this.checked)">
                    </div>
                    <div class="alarm-config-row">
                        <input type="time" class="alarm-time-picker" value="${al.time}" onchange="changeAlarmTime(${al.id}, this.value)">
                        <select class="alarm-sound-select" onchange="changeAlarmSound(${al.id}, this.value)">${soundOpts}</select>
                    </div>`;
                container.appendChild(card);
            });
            document.getElementById('alarm-panel').style.display = 'flex';
        }
        function closeAlarmSettings() { document.getElementById('alarm-panel').style.display = 'none'; localStorage.setItem('weather_alarms', JSON.stringify(alarms)); }
        function toggleAlarmSlot(id, checked) { alarms.find(a => a.id === id).enabled = checked; }
        function changeAlarmTime(id, val) { alarms.find(a => a.id === id).time = val; }
        function changeAlarmSound(id, val) { alarms.find(a => a.id === id).type = val; }

        async function searchCity() {
            const query = document.getElementById('city-search').value;
            const box = document.getElementById('city-sug'); if(query.length < 3) { box.innerHTML = ''; return; }
            try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=sk`);
                const data = await res.json(); box.innerHTML = '';
                if(data.results) {
                    data.results.forEach(city => {
                        const li = document.createElement('li'); li.textContent = `${city.name}, ${city.country || ''}`;
                        li.onclick = () => {
                            currentLoc = { name: city.name, lat: city.latitude, lon: city.longitude };
                            localStorage.setItem('selected_location', JSON.stringify(currentLoc));
                            fetchWeather(); box.innerHTML = '';
                        }; box.appendChild(li);
                    });
                }
            } catch(e) {}
        }

        function getLocationByGPS() {
            if (navigator.geolocation) {
                document.getElementById('city-search').value = "Hľadám GPS...";
                navigator.geolocation.getCurrentPosition(position => {
                    currentLoc = { name: "📍 Lokálna GPS", lat: position.coords.latitude, lon: position.coords.longitude };
                    localStorage.setItem('selected_location', JSON.stringify(currentLoc)); fetchWeather();
                });
            }
        }

        async function searchRadio() {
            const query = document.getElementById('radio-search').value;
            const box = document.getElementById('radio-sug'); if(query.length < 3) { box.innerHTML = ''; return; }
            try {
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(query)}?limit=5`);
                const stations = await res.json(); box.innerHTML = '';
                stations.forEach(st => {
                    if(st.url_resolved) {
                        const li = document.createElement('li'); li.textContent = `📻 ${st.name}`;
                        li.onclick = () => {
                            lastRadioUrl = st.url_resolved; lastRadioName = st.name;
                            localStorage.setItem('last_radio_url', lastRadioUrl); localStorage.setItem('last_radio_name', lastRadioName);
                            document.getElementById('radio-search').value = st.name;
                            resumeAudioCtx();
                            streamPlayer.src = lastRadioUrl; streamPlayer.play();
                            buildTicker();
                            box.innerHTML = '';
                        }; box.appendChild(li);
                    }
                });
            } catch(e) {}
        }

        function setVolume(val) { streamPlayer.volume = parseFloat(val); }
        function toggleMute() {
            isMuted = !isMuted; streamPlayer.muted = isMuted;
            const btn = document.getElementById('btn-mute');
            btn.textContent = isMuted ? "Unmute" : "Mute";
            btn.classList.toggle('is-muted', isMuted);
        }

        fetchWeather(); setInterval(fetchWeather, 600000); setTimeout(requestWakeLock, 1500);
    </script>
</body>
</html>
